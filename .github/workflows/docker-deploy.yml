name: Build & Deploy (split jobs)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_BACK: ${{ vars.DOCKERHUB_USERNAME }}/lgback
  IMAGE_FRONT: ${{ vars.DOCKERHUB_USERNAME }}/lgfront

jobs:
  build_back:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push BACK
        uses: docker/build-push-action@v6
        with:
          context: ./back
          env:
            DATABASE_URL: ${{ secrets.DATABASE_URL }}
          push: true
          tags: |
            ${{ env.IMAGE_BACK }}:latest

  build_front:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push FRONT
        uses: docker/build-push-action@v6
        with:
          context: ./front
          push: true
          tags: |
            ${{ env.IMAGE_FRONT }}:latest

  deploy:
    needs: [build_back, build_front]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (to get compose file)
        uses: actions/checkout@v4

      - name: Ensure target directory on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            mkdir -p ${{ secrets.VPS_PATH }}

      - name: Upload compose.yaml to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          source: "compose.yaml"
          target: ${{ secrets.VPS_PATH }}
          overwrite: true

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            set -e
            cd ${{ secrets.VPS_PATH }}
            if [ ! -f .env ]; then
              echo "ERREUR: .env manquant dans ${{ secrets.VPS_PATH }}. Crée-le puis relance."
              exit 1
            fi
            docker compose -f compose.yaml pull
            docker compose -f compose.yaml up -d --remove-orphans
            docker system prune -f
