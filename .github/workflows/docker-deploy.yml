name: Build & Deploy (split jobs)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_BACK: ${{ vars.DOCKERHUB_USERNAME }}/lgback
  IMAGE_FRONT: ${{ vars.DOCKERHUB_USERNAME }}/lgfront

jobs:
  build_back:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push BACK
        uses: docker/build-push-action@v7
        with:
          context: ./back
          push: true
          tags: |
            ${{ env.IMAGE_BACK }}:latest

  build_front:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push FRONT
        uses: docker/build-push-action@v7
        with:
          context: ./front
          build-args: |
            VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}
          push: true
          tags: |
            ${{ env.IMAGE_FRONT }}:latest

  deploy:
    needs: [build_back, build_front]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (to get compose file)
        uses: actions/checkout@v6

      - name: Ensure target directory on VPS
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            mkdir -p ${{ secrets.VPS_PATH }}

      - name: Generate deploy env file
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ACCESS_KEY_ID: ${{ secrets.ACCESS_KEY_ID }}
          SUPABASE_STORAGE_BUCKET: ${{ secrets.SUPABASE_STORAGE_BUCKET }}
          MEDIA_MAX_FILE_SIZE_BYTES: ${{ secrets.MEDIA_MAX_FILE_SIZE_BYTES }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          CORS_ORIGIN: ${{ secrets.CORS_ORIGIN }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: |
          {
            printf 'DATABASE_URL=%s\n' "$DATABASE_URL"
            printf 'SUPABASE_URL=%s\n' "$SUPABASE_URL"
            printf 'SUPABASE_SERVICE_ROLE_KEY=%s\n' "$SUPABASE_SERVICE_ROLE_KEY"
            printf 'ACCESS_KEY_ID=%s\n' "$ACCESS_KEY_ID"
            printf 'SUPABASE_STORAGE_BUCKET=%s\n' "$SUPABASE_STORAGE_BUCKET"
            printf 'MEDIA_MAX_FILE_SIZE_BYTES=%s\n' "$MEDIA_MAX_FILE_SIZE_BYTES"
            printf 'STRIPE_SECRET_KEY=%s\n' "$STRIPE_SECRET_KEY"
            printf 'CORS_ORIGIN=%s\n' "$CORS_ORIGIN"
            printf 'VITE_API_BASE_URL=%s\n' "$VITE_API_BASE_URL"
          } > .env

      - name: Upload compose.yaml and .env to VPS
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          source: "compose.yaml,.env"
          target: ${{ secrets.VPS_PATH }}
          overwrite: true

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            set -e
            cd ${{ secrets.VPS_PATH }}
            test -f .env
            docker compose -f compose.yaml pull
            docker compose -f compose.yaml run --rm back npm run prisma:cd
            docker compose -f compose.yaml up -d --remove-orphans
            docker system prune -f
